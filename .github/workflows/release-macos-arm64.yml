name: Release macOS arm64

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    name: Build and publish Apple Silicon release
    runs-on: macos-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin

      - name: Cache Rust build
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install dependencies
        run: npm ci

      - name: Check release version
        id: version
        shell: bash
        run: |
          VERSION="$(node -p "require('./package.json').version")"
          RELEASE_TAG="v${VERSION}"
          if [[ "${GITHUB_REF_TYPE}" == "tag" && "${GITHUB_REF_NAME}" != "${RELEASE_TAG}" ]]; then
            echo "Tag ${GITHUB_REF_NAME} does not match package version ${VERSION}." >&2
            exit 1
          fi
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "tag=${RELEASE_TAG}" >> "$GITHUB_OUTPUT"

      - name: Verify updater signing secret
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
        shell: bash
        run: |
          if [[ -z "${TAURI_SIGNING_PRIVATE_KEY}" ]]; then
            echo "Missing GitHub Actions secret: TAURI_SIGNING_PRIVATE_KEY" >&2
            exit 1
          fi

      - name: Lint frontend
        run: npm run lint

      - name: Build and publish Tauri release
        id: tauri
        uses: tauri-apps/tauri-action@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ""
        with:
          tagName: ${{ steps.version.outputs.tag }}
          releaseName: "ToT 日程 v${{ steps.version.outputs.version }}"
          releaseBody: "ToT 日程 macOS Apple Silicon（M1 及以上）版本。"
          releaseDraft: true
          prerelease: false
          generateReleaseNotes: true
          uploadUpdaterJson: true
          uploadUpdaterSignatures: true
          args: "--target aarch64-apple-darwin --bundles app,dmg"

      - name: Add repair script to DMG
        id: dmg
        shell: bash
        run: |
          DMG_PATH="$(find src-tauri/target/aarch64-apple-darwin/release/bundle/dmg -maxdepth 1 -name '*.dmg' -type f -print -quit)"
          if [[ -z "${DMG_PATH}" ]]; then
            echo "DMG artifact was not found." >&2
            exit 1
          fi
          scripts/add-fix-script-to-dmg.sh "${DMG_PATH}"
          echo "path=${DMG_PATH}" >> "$GITHUB_OUTPUT"

      - name: Replace release DMG with repaired image
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload "${{ steps.version.outputs.tag }}" "${{ steps.dmg.outputs.path }}" --clobber

      - name: Publish release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release edit "${{ steps.version.outputs.tag }}" --draft=false --latest
